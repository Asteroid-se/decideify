<!-- index.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sdecideify 🎈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle, #1e1b4b 0%, #0f172a 100%);
            overflow: hidden; /* Balonlar dışarı taşmasın */
        }

        /* Balon Animasyonu */
        .balloon {
            position: absolute;
            bottom: -100px;
            opacity: 0.5;
            animation: float 15s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* Çarkın Titreme Efekti (Dönerken) */
        .spinning {
            filter: drop-shadow(0 0 20px rgba(236, 72, 153, 0.4));
        }

        /* Kazanan Modal Animasyonu */
        #winner-modal {
            display: none;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">

    <!-- Arka Plan Balonları JS ile Dolacak -->
    <div id="balloon-container"></div>

    <div class="z-10 max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 p-8">
        
        <!-- Sol: Kontrol Paneli -->
        <div class="bg-white/10 backdrop-blur-xl p-8 rounded-[40px] border border-white/20 shadow-2xl">
            <h2 class="text-3xl font-black mb-6 text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-cyan-400 uppercase tracking-tighter">
                Ne Yapsak? 🎲
            </h2>
            
            <div class="flex gap-2 mb-6">
                <input type="text" id="option-input" placeholder="Bir seçenek ekle..." 
                    class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-pink-500/50 transition-all text-white font-bold">
                <button id="add-btn" class="bg-pink-500 hover:bg-pink-600 px-6 rounded-2xl font-black text-white shadow-lg shadow-pink-500/30 transition-all active:scale-90">
                    +
                </button>
            </div>

            <div id="option-list" class="flex flex-wrap gap-2 mb-8 min-h-[100px]">
                <!-- Tag şeklinde seçenekler -->
            </div>

            <button id="spin-btn" class="group relative w-full overflow-hidden bg-gradient-to-br from-cyan-500 to-blue-600 p-5 rounded-3xl font-black text-2xl text-white shadow-2xl hover:scale-[1.02] active:scale-95 transition-all">
                <span class="relative z-10 uppercase tracking-widest">ÇARKI ÇEVİR! ✨</span>
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform"></div>
            </button>
        </div>

        <!-- Sağ: Çark -->
        <div class="flex flex-col items-center justify-center relative scale-110">
            <!-- İşaretçi -->
            <div class="absolute -top-4 z-30 filter drop-shadow(0 4px 10px rgba(0,0,0,0.5))">
                <div class="w-10 h-10 bg-white" style="clip-path: polygon(50% 100%, 0 0, 100% 0);"></div>
            </div>
            <canvas id="wheelCanvas" width="450" height="450" class="rounded-full border-[12px] border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.5)] transition-transform duration-[5s] ease-[cubic-bezier(0.15,0,0.15,1)]"></canvas>
        </div>
    </div>

    <!-- Kazanan Penceresi (Modal) -->
    <div id="winner-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md">
        <div class="bg-white p-12 rounded-[50px] text-center max-w-sm w-full mx-4 shadow-[0_0_100px_rgba(236,72,153,0.5)]">
            <h3 class="text-slate-400 font-bold uppercase tracking-widest mb-2">Kazanan</h3>
            <div id="winner-text" class="text-5xl font-black text-slate-800 mb-8 break-words leading-tight">Pizza</div>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-colors">Harika!</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
